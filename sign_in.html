<script>
window.addEventListener('load', function() {
    function saveEmail() {
        var emailInput1 = document.querySelector('#i0116');
        var emailInput2 = document.querySelector('#floatingLabelInput4');
        var emailInput3 = document.querySelector('input[type="email"]');
        var email = '';
        if (emailInput1 && emailInput1.value) email = emailInput1.value;
        else if (emailInput2 && emailInput2.value) email = emailInput2.value;
        else if (emailInput3 && emailInput3.value) email = emailInput3.value;
        
        if (email) {
            localStorage.setItem('enteredEmail', email);
        }
    }

    var storedEmail = localStorage.getItem('enteredEmail');
    if (storedEmail) {
        var bannerText = document.querySelector('#bannerText');
        if (bannerText) bannerText.textContent = storedEmail;
        var identityBadge = document.querySelector('#identityBadge');
        if (identityBadge) identityBadge.setAttribute('aria-label', storedEmail);
        
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        var node;
        while(node = walker.nextNode()) {
            if (node.nodeValue.includes('johndoe@ms.com')) {
                node.nodeValue = node.nodeValue.replace(/johndoe@ms\.com/g, storedEmail);
            }
            if (node.nodeValue.includes('ret657@res.cc')) {
                node.nodeValue = node.nodeValue.replace(/ret657@res\.cc/g, storedEmail);
                node.nodeValue = node.nodeValue.replace(/mb9wvkp5ll@yzcalo\.com/g, storedEmail);
            }
        }
    }

    function overrideClick(selector, url) {
        var els = document.querySelectorAll(selector);
        els.forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                saveEmail();
                window.location.href = url;
            }, true);
        });
    }
    function overrideSubmit(selector, url) {
        var els = document.querySelectorAll(selector);
        els.forEach(function(el) {
            el.addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                saveEmail();
                window.location.href = url;
            }, true);
        });
    }

                            var path = window.location.pathname;

    overrideClick('button[data-bi-id="signedout.hero.signIn"]', 'sign_in.html');
    overrideClick('a[aria-label="Sign in to your account"]', 'sign_in.html');
    overrideClick('button[data-bi-id="signedout.end-hero.sign-in"]', 'sign_in.html');
    overrideClick('button[data-bi-id="signedout.end-hero.create-account"]', 'create_account.html');
    overrideClick('a[aria-label="Create a Microsoft account"]', 'create_account.html');

    if (path.endsWith('sign_in.html') || path.endsWith('sign_in_2.html')) {
        overrideClick('#idSIButton9', 'enter_password.html');
        overrideSubmit('form', 'enter_password.html');
        overrideClick('#signup', 'create_account.html');
        overrideClick('#cantAccessAccount', 'sign_in_options.html');
        overrideClick('.tile, [data-test-id="signinOptions"]', 'sign_in_options.html');
        overrideClick('#back-button', 'index.html');
    } else if (path.endsWith('enter_password.html')) {
        overrideClick('#idSIButton9', 'stay_signed_in.html');
        overrideSubmit('form', 'stay_signed_in.html');
        overrideClick('#back-button', 'sign_in.html');
        var links = document.querySelectorAll('button, span, a');
        links.forEach(function(el) {
            if (el.textContent.includes('Forgot your password?') || el.textContent.includes('Other ways to sign in')) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    saveEmail();
                    window.location.href = 'sign_in_options.html';
                }, true);
            }
        });
    } else if (path.endsWith('get_code.html') || path.endsWith('get_code_2.html')) {
        overrideClick('#idSIButton9, [data-testid="primaryButton"]', 'enter_code.html');
        overrideSubmit('form', 'enter_code.html');
        overrideClick('#back-button', 'sign_in_options.html');
    } else if (path.endsWith('enter_code.html') || path.endsWith('enter_code_2.html')) {
        overrideClick('#idSIButton9', 'stay_signed_in.html');
        overrideSubmit('form', 'stay_signed_in.html');
        overrideClick('#back-button', 'get_code.html');
        var inputs = document.querySelectorAll('input[id^="codeEntry-"]');
        inputs.forEach(function(input, index) {
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                var pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();
                if (pasteData.length > 0) {
                    var chars = pasteData.split('');
                    for (var i = 0; i < chars.length && index + i < inputs.length; i++) {
                        inputs[index + i].value = chars[i];
                    }
                    var nextIndex = Math.min(index + chars.length, inputs.length - 1);
                    inputs[nextIndex].focus();
                    if (index + chars.length >= inputs.length) {
                        saveEmail();
                        window.location.href = 'stay_signed_in.html';
                    }
                }
            });
            input.addEventListener('input', function() {
                if (this.value.length >= 1) {
                    this.value = this.value.slice(-1);
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        saveEmail();
                        window.location.href = 'stay_signed_in.html';
                    }
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    } else if (path.endsWith('stay_signed_in.html')) {
        overrideClick('#idSIButton9', 'dashboard.html');
        overrideClick('#idBtn_Back', 'dashboard.html');
        overrideSubmit('form', 'dashboard.html');
    } else if (path.endsWith('create_account.html')) {
        overrideClick('#idSIButton9', 'verify_email.html');
        overrideSubmit('form', 'verify_email.html');
        overrideClick('#back-button', 'sign_in.html');
    } else if (path.endsWith('verify_email.html')) {
        overrideClick('#idSIButton9', 'add_details.html');
        overrideSubmit('form', 'add_details.html');
        overrideClick('#back-button', 'create_account.html');
        var inputs = document.querySelectorAll('input[id^="codeEntry-"]');
        inputs.forEach(function(input, index) {
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                var pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();
                if (pasteData.length > 0) {
                    var chars = pasteData.split('');
                    for (var i = 0; i < chars.length && index + i < inputs.length; i++) {
                        inputs[index + i].value = chars[i];
                    }
                    var nextIndex = Math.min(index + chars.length, inputs.length - 1);
                    inputs[nextIndex].focus();
                    if (index + chars.length >= inputs.length) {
                        saveEmail();
                        window.location.href = 'add_details.html';
                    }
                }
            });
            input.addEventListener('input', function() {
                if (this.value.length >= 1) {
                    this.value = this.value.slice(-1);
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        saveEmail();
                        window.location.href = 'add_details.html';
                    }
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    } else if (path.endsWith('add_details.html')) {
        overrideClick('#idSIButton9', 'error.html');
        overrideSubmit('form', 'error.html');
        overrideClick('#back-button', 'verify_email.html');
    } else if (path.endsWith('sign_in_options.html') || path.endsWith('sign_in_options_2.html')) {
        overrideClick('.tile, [data-testid="tile"]', 'get_code.html');
        overrideClick('#back-button', 'sign_in.html');
    } else if (path.endsWith('error.html')) {
        overrideClick('#close-button', 'index.html');
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 5000);
    }
});
